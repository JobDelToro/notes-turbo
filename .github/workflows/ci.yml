name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_COLOR: 3
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  backend:
    name: backend (django + drf)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      # SQLite in CI — no external services needed. Leaving DATABASE_URL empty
      # makes settings fall back to SQLite (see config/settings.py).
      DJANGO_SECRET_KEY: ci-secret-key-not-used-in-prod
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Migrations are up to date
        run: python manage.py makemigrations --check --dry-run

      - name: Tests (pytest + coverage)
        run: pytest --cov --cov-report=term-missing --cov-fail-under=85

  frontend:
    name: frontend (next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # frontend/ is owned by a separate workstream and may not exist yet.
      # Detect it so this job is a no-op until the app lands, then runs for real.
      - name: Detect frontend
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "frontend/package.json not found yet — skipping frontend job."
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm ci

      - name: Lint (eslint)
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run lint

      - name: Typecheck (tsc)
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Tests (vitest + RTL)
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm test

      - name: Build
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run build

  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install commit tooling
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
